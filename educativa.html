
           <!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aplicação Educativa - Sílabas</title>
  <link rel="stylesheet" href="educativa.css">
</head>
<body>

<section class="atividade">
  <h1>Quantas sílabas tem?</h1>
  <p>Escolha uma cor e clique na quantidade correta de sílabas.</p>

  <div class="paleta">
    <button class="cor azul" onclick="escolherCor('#4da3ff')"></button>
    <button class="cor verde" onclick="escolherCor('#58d68d')"></button>
    <button class="cor amarelo" onclick="escolherCor('#f7dc6f')"></button>
    <button class="cor rosa" onclick="escolherCor('#f5b7b1')"></button>
  </div>

  <div class="cards">

    <div class="card">
      <div class="figura">🔩</div>
      <h2>PARAFUSO</h2>
      <div class="opcoes">
        <button onclick="verificar(this, 1, 4)">1</button>
        <button onclick="verificar(this, 2, 4)">2</button>
        <button onclick="verificar(this, 3, 4)">3</button>
        <button onclick="verificar(this, 4, 4)">4</button>
      </div>
    </div>

    <div class="card">
      <div class="figura">🚙</div>
      <h2>JIPE</h2>
      <div class="opcoes">
        <button onclick="verificar(this, 1, 2)">1</button>
        <button onclick="verificar(this, 2, 2)">2</button>
        <button onclick="verificar(this, 3, 2)">3</button>
        <button onclick="verificar(this, 4, 2)">4</button>
      </div>
    </div>

    <div class="card">
      <div class="figura">🦘</div>
      <h2>CANGURU</h2>
      <div class="opcoes">
        <button onclick="verificar(this, 1, 3)">1</button>
        <button onclick="verificar(this, 2, 3)">2</button>
        <button onclick="verificar(this, 3, 3)">3</button>
        <button onclick="verificar(this, 4, 3)">4</button>
      </div>
    </div>

  </div>

  <p id="mensagem"></p>

  <br>

  <a href="index.html">
    <button>Voltar para Página Inicial</button>
  </a>
</section>

<script src="educativa.js"></script>
</body>
</html>
